<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTech Chatbot Widget</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  #dt-launcher {
    position: fixed; bottom: 24px; right: 24px;
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle at 35% 25%, #73eeee, #4FC5C5 52%, #2fa7a7 100%);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(79,197,197,0.36), 0 2px 8px rgba(0,0,0,0.12);
    z-index: 99998; transition: transform 0.2s, box-shadow 0.2s;
  }
  #dt-launcher:hover { transform: scale(1.06); box-shadow: 0 14px 34px rgba(79,197,197,0.42), 0 2px 8px rgba(0,0,0,0.12); }
  #dt-launcher svg { width: 28px; height: 28px; fill: #fff; }
  #dt-badge {
    position: absolute; top: -4px; right: -4px;
    background: #e53e3e; color: #fff; font-size: 10px; font-weight: 700;
    width: 18px; height: 18px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }

  #dt-window {
    position: fixed; bottom: 96px; right: 24px;
    width: 380px; max-height: 600px;
    background: #fff; border-radius: 20px;
    display: flex; flex-direction: column;
    box-shadow: 0 18px 60px rgba(15,23,42,0.18);
    z-index: 99997; overflow: hidden;
    transform: scale(0.92) translateY(18px);
    opacity: 0; pointer-events: none;
    transition: transform 0.22s cubic-bezier(.4,0,.2,1), opacity 0.18s;
    border: 1px solid rgba(226,232,240,0.9);
  }
  #dt-window.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

  #dt-header {
    background: linear-gradient(135deg, #263238 0%, #2FAAAA 100%);
    padding: 15px 16px; display: flex; align-items: center; gap: 11px; flex-shrink: 0;
  }
  .dt-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.16);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; color: #fff; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.22);
  }
  .dt-hinfo { flex: 1; min-width: 0; }
  .dt-hname { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .dt-hstatus { color: rgba(255,255,255,0.76); font-size: 11.5px; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .dt-dot { width: 7px; height: 7px; background: #48bb78; border-radius: 50%; }
  #dt-close {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.72); font-size: 22px; line-height: 1;
    padding: 2px 6px; border-radius: 8px; transition: all 0.15s;
  }
  #dt-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

  #dt-messages {
    flex: 1; overflow-y: auto; padding: 15px 13px;
    display: flex; flex-direction: column; gap: 10px;
    background: linear-gradient(180deg, #f7fafc 0%, #f3f6f8 100%);
  }
  #dt-messages::-webkit-scrollbar { width: 4px; }
  #dt-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

  .dt-msg { display: flex; flex-direction: column; max-width: 88%; }
  .dt-msg.bot { align-self: flex-start; }
  .dt-msg.user { align-self: flex-end; }

  .dt-bubble {
    padding: 10px 13px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .dt-msg.bot .dt-bubble {
    background: #fff; color: #1a202c;
    border: 1px solid #e4e9ef; border-bottom-left-radius: 5px;
    box-shadow: 0 4px 14px rgba(15,23,42,0.04);
  }
  .dt-msg.user .dt-bubble {
    background: #4FC5C5; color: #fff; border-bottom-right-radius: 5px;
    box-shadow: 0 4px 14px rgba(79,197,197,0.18);
  }
  .dt-time { font-size: 10px; color: #9aa6b2; margin-top: 3px; padding: 0 3px; }
  .dt-msg.user .dt-time { text-align: right; }

  .dt-qrow { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
  .dt-qbtn {
    background: #fff; border: 1px solid #c9eeee; color: #217f7f;
    font-size: 12px; padding: 7px 11px; border-radius: 999px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; font-family: inherit; font-weight: 600;
    box-shadow: 0 3px 10px rgba(15,23,42,0.04);
  }
  .dt-qbtn:hover { background: #4FC5C5; color: #fff; border-color: #4FC5C5; transform: translateY(-1px); }
  .dt-qbtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .dt-typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 13px; background: #fff;
    border: 1px solid #e2e8f0; border-radius: 14px; border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .dt-typing span {
    width: 6px; height: 6px; background: #4FC5C5; border-radius: 50%;
    animation: dtb 1.2s infinite; opacity: 0.55;
  }
  .dt-typing span:nth-child(2) { animation-delay: 0.2s; }
  .dt-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dtb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  #dt-footer {
    border-top: 1px solid #edf2f7; padding: 10px 12px;
    display: flex; gap: 8px; align-items: flex-end;
    background: #fff; flex-shrink: 0;
  }
  #dt-input {
    flex: 1; border: 1px solid #cbd5e0; border-radius: 20px;
    padding: 8px 14px; font-size: 13.5px; background: #f7fafc;
    color: #2d3748; resize: none; outline: none;
    max-height: 100px; overflow-y: auto; line-height: 1.45;
    font-family: inherit; transition: border-color 0.15s, background 0.15s;
  }
  #dt-input:focus { border-color: #4FC5C5; background: #fff; }
  #dt-input::placeholder { color: #a0aec0; }
  #dt-send {
    width: 36px; height: 36px; border-radius: 50%;
    background: #4FC5C5; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s, transform 0.12s;
  }
  #dt-send:hover { background: #37AFAF; }
  #dt-send:active { transform: scale(0.92); }
  #dt-send:disabled { background: #cbd5e0; cursor: not-allowed; }
  #dt-send svg { width: 16px; height: 16px; fill: #fff; }
  #dt-footnote {
    text-align: center; font-size: 10px; color: #9aa6b2;
    padding: 0 0 8px; background: #fff; flex-shrink: 0;
  }

  a.wa-l { color: #25D366; font-weight: 700; text-decoration: none; }
  a.wa-l:hover { text-decoration: underline; }
  a.ig-l { color: #C13584; font-weight: 700; text-decoration: none; }
  a.ig-l:hover { text-decoration: underline; }
  a.dt-linkbtn {
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 8px; padding: 8px 12px; border-radius: 999px;
    background: #4FC5C5; color: #fff !important; font-weight: 700;
    font-size: 12.5px; text-decoration: none; box-shadow: 0 5px 14px rgba(79,197,197,0.22);
  }
  a.dt-linkbtn:hover { background: #37AFAF; text-decoration: none; }
  a.dt-textlink { color: #217f7f; font-weight: 700; text-decoration: underline; }

  @media (max-width: 420px) {
    #dt-window { width: calc(100vw - 20px); right: 10px; bottom: 84px; max-height: 590px; }
    #dt-launcher { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<button id="dt-launcher" aria-label="DENTech destek chatını aç">
  <span id="dt-badge">1</span>
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
</button>

<div id="dt-window" role="dialog" aria-label="DENTech Medikal Destek">
  <div id="dt-header">
    <div class="dt-avatar">D</div>
    <div class="dt-hinfo">
      <div class="dt-hname">DEO AI</div>
      <div class="dt-hstatus"><span class="dt-dot"></span>Dental Ürün Asistanı</div>
    </div>
    <button id="dt-close" aria-label="Kapat">✕</button>
  </div>

  <div id="dt-messages">
    <div class="dt-msg bot">
      <div class="dt-bubble">Merhaba, ben <strong>DEO AI</strong>.

DENTech Medikal ürünleri hakkında hızlıca yardımcı olabilirim.</div>
      <div class="dt-qrow">
        <button class="dt-qbtn" data-msg="RVG ve klinik cihazlar hakkında bilgi almak istiyorum">RVG & Klinik Cihazlar</button>
        <button class="dt-qbtn" data-msg="JOTA Essential II kit ve frezler hakkında bilgi almak istiyorum">JOTA Frezleri</button>
        <button class="dt-qbtn" data-msg="JB Tray ve ölçü sistemleri hakkında bilgi almak istiyorum">JB Tray & Ölçü</button>
        <button class="dt-qbtn" data-msg="Pedodonti ürünleri hakkında bilgi almak istiyorum">Pedodonti</button>
        <button class="dt-qbtn" data-msg="Uzman temsilciyle görüşmek istiyorum">Uzman Temsilci</button>
      </div>
      <div class="dt-time" id="dt-wtime"></div>
    </div>
  </div>

  <div id="dt-footer">
    <textarea id="dt-input" placeholder="Mesajınızı yazın..." rows="1" aria-label="Mesaj"></textarea>
    <button id="dt-send" disabled aria-label="Gönder">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="dt-footnote">DENTech Medikal · Yapay zeka destekli ürün asistanı</div>
</div>

<script>
const API_URL = "https://chatbot-v1-xi.vercel.app/api/chat";

let history = [];
let busy = false;

const launcher = document.getElementById('dt-launcher');
const badge    = document.getElementById('dt-badge');
const win      = document.getElementById('dt-window');
const input    = document.getElementById('dt-input');
const sendBtn  = document.getElementById('dt-send');
const msgs     = document.getElementById('dt-messages');

document.getElementById('dt-wtime').textContent = getTime();
setTimeout(() => { if (!win.classList.contains('open')) badge.style.display = 'flex'; }, 3000);

launcher.addEventListener('click', () => {
  win.classList.add('open');
  badge.style.display = 'none';
  setTimeout(() => input.focus(), 250);
});
document.getElementById('dt-close').addEventListener('click', () => win.classList.remove('open'));

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || busy;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) doSend(); }
});
sendBtn.addEventListener('click', doSend);

document.querySelectorAll('.dt-qbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const msg = btn.getAttribute('data-msg');
    if (msg) quickSend(msg);
  });
});

function quickSend(text) {
  if (busy) return;
  document.querySelectorAll('.dt-qbtn').forEach(b => b.disabled = true);
  push('user', text);
  callAPI();
}

function doSend() {
  const text = input.value.trim();
  if (!text || busy) return;
  input.value = ''; input.style.height = 'auto'; sendBtn.disabled = true;
  push('user', text);
  callAPI();
}

function push(role, content) {
  addBubble(role, content);
  history.push({ role, content });
}

function addBubble(role, text) {
  const d = document.createElement('div');
  d.className = 'dt-msg ' + role;
  const b = document.createElement('div');
  b.className = 'dt-bubble';
  b.innerHTML = role === 'bot' ? fmt(text) : esc(text);
  const t = document.createElement('div');
  t.className = 'dt-time'; t.textContent = getTime();
  d.appendChild(b); d.appendChild(t);
  msgs.appendChild(d); scrollDown();
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'dt-msg bot'; d.id = 'dt-typing';
  d.innerHTML = '<div class="dt-typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(d); scrollDown();
}
function removeTyping() { const e = document.getElementById('dt-typing'); if (e) e.remove(); }

function fmt(text) {
  let t = esc(text || '');
  const placeholders = [];
  const hold = (html) => {
    const key = `__DT_LINK_${placeholders.length}__`;
    placeholders.push([key, html]);
    return key;
  };

  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => hold(linkHtml(label, url)));

  t = t.replace(/(https?:\/\/[^\s<]+)/g, (url) => {
    let clean = url;
    let suffix = '';
    while (/[.,!?)]$/.test(clean)) { suffix = clean.slice(-1) + suffix; clean = clean.slice(0, -1); }
    return hold(linkHtml(defaultLabel(clean), clean)) + suffix;
  });

  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  placeholders.forEach(([key, html]) => { t = t.replaceAll(key, html); });
  return t;
}

function linkHtml(label, url) {
  const safeUrl = escAttr(url);
  const safeLabel = String(label || defaultLabel(url)).replace(/&amp;/g, '&');
  if (url.includes('wa.me')) return `<a href="${safeUrl}" class="wa-l" target="_blank" rel="noopener">📲 WhatsApp'a Yaz</a>`;
  if (url.includes('instagram.com')) return `<a href="${safeUrl}" class="ig-l" target="_blank" rel="noopener">📸 Instagram'da Ulaş</a>`;
  if (url.includes('dentechmedikal.com')) return `<a href="${safeUrl}" class="dt-linkbtn" target="_self" rel="noopener">${safeLabel || 'Ürün sayfasına git'}</a>`;
  return `<a href="${safeUrl}" class="dt-textlink" target="_blank" rel="noopener">${safeLabel || safeUrl}</a>`;
}

function defaultLabel(url) {
  if (url.includes('dentechmedikal.com')) return 'Ürün sayfasına git';
  if (url.includes('wa.me')) return "WhatsApp'a Yaz";
  if (url.includes('instagram.com')) return "Instagram'da Ulaş";
  return url;
}

function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getTime() { return new Date().toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' }); }
function scrollDown() { msgs.scrollTop = msgs.scrollHeight; }

async function callAPI() {
  if (busy) return;
  busy = true; sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-14) })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok || data.error) {
      addBubble('bot', 'Bir sorun oluştu. Lütfen doğrudan WhatsApp üzerinden yazın:\nhttps://wa.me/905322649611');
    } else {
      const reply = data.choices?.[0]?.message?.content || 'Yanıt alınamadı.';
      history.push({ role: 'assistant', content: reply });
      if (history.length > 22) history = history.slice(-20);
      addBubble('bot', reply);
    }
  } catch {
    removeTyping();
    addBubble('bot', 'Bağlantı hatası. WhatsApp üzerinden yazabilirsiniz:\nhttps://wa.me/905322649611');
  }

  busy = false;
  sendBtn.disabled = !input.value.trim();
}
</script>
</body>
</html>
